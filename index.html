<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添興家具｜架高床歷年作品集</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; background-color: #f5efe6; margin: 0; padding: 20px; }
        .header-logo { display: block; margin: 20px auto; max-width: 150px; }
        .section-title { color: #4a3f35; font-size: 1.8rem; text-align: center; margin: 30px 0; white-space: nowrap; letter-spacing: 5px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
        .card-tag { padding: 15px; text-align: center; font-weight: bold; color: #70665f; }
        @media (min-width: 768px) { .header-logo { position: absolute; top: 25px; right: 25px; margin: 0; } }
    </style>
</head>
<body>
    <img src="0-logo-02.png" alt="添興家具" class="header-logo">
    <h2 class="section-title">架高床歷年作品集</h2>
    <div class="gallery">
        <div class="card" onclick="window.location.href='B1.html'">
            <img src="6.jpg" alt="B1">
            <div class="card-tag">2025/10 客製架高床</div>
        </div>
    </div>
</body>
</html>
