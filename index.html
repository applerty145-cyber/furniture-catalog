<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>添興家具｜NO.2 作品集</title>
    <style>
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: #f5efe6; margin: 0; padding: 20px; 
        }
        /* 粉圓體設定 (引用 Google Fonts) */
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700&display=swap');
        .section-title { 
            font-family: 'M PLUS Rounded 1c', sans-serif; color: #4a3f35; 
            font-size: 2.2rem; text-align: center; margin: 50px 0; 
        }
        .header-logo { position: absolute; top: 25px; right: 25px; max-width: 140px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
        .card-tag { padding: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <img src="0-logo-02.png" alt="添興家具" class="header-logo">
    <h2 class="section-title">NO.2 作品集</h2>
    <div class="gallery">
        <div class="card" onclick="window.location.href='./B1.html'">
            <img src="6.jpg" alt="B1">
            <div class="card-tag">經典機能款 (B1)</div>
        </div>
    </div>
</body>
</html>
