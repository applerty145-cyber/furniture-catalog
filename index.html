<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>添興家具｜客製架高床作品集</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5efe6;
            margin: 0;
            padding: 20px;
            position: relative;
        }
        .header-logo {
            position: absolute;
            top: 25px;
            right: 25px;
            max-width: 200px;
            height: auto;
            z-index: 10;
        }
        .title-container {
            text-align: center;
            padding-top: 50px;
            margin-bottom: 35px;
        }
        .section-title {
            color: #4a3f35;
            font-family: "Noto Serif TC", "Songti TC", serif;
            font-size: 2.2rem;
            font-weight: 500;
            margin: 0 auto 15px auto;
            letter-spacing: 4px;
            position: relative;
            padding-bottom: 12px;
            max-width: 380px;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 1px;
            background-color: #c5bbae;
        }
        .hint-text {
            color: #70665f;
            font-size: 0.95rem;
            margin: 15px 0 0 0;
            letter-spacing: 1px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 10px auto 40px auto;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eae6e1;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card img {
            width: 100%;
            height: auto;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
        }
        .card-tag {
            padding: 15px;
            text-align: center;
            background: #fff;
            color: #4a3f35;
            font-size: 1rem;
            letter-spacing: 1px;
            font-weight: 500;
        }
        @media (max-width: 768px) {
            body { padding: 15px; }
            .header-logo { top: 15px; right: 15px; max-width: 140px; }
            .title-container { padding-top: 55px; margin-bottom: 25px; }
            .section-title { font-size: 1.8rem; max-width: 300px; }
            .gallery { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
        }
    </style>
</head>
<body>

    <img src="0-logo-02.png" alt="添興家具" class="header-logo">

    <div class="title-container">
        <h2 class="section-title">客製架高床作品集</h2>
        <p class="hint-text">點擊作品可進入瀏覽詳細型錄</p>
    </div>

    <div class="gallery">
        <div class="card" onclick="window.location.href='./B1.html'">
            <img src="6.jpg" alt="客製架高床系列 B1">
            <div class="card-tag">經典一體化機能款 (B1)</div>
        </div>
    </div>

</body>
</html>
