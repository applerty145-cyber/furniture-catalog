<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添興家具｜詳細作品展示</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; background-color: #f5efe6; margin: 0; padding: 20px; }
        .back-btn { position: absolute; top: 25px; left: 25px; background: #e67e22; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; z-index: 100; }
        .section-title { color: #4a3f35; font-size: 2.2rem; text-align: center; margin: 80px 0 40px 0; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.02); }
        .card img { width: 100%; height: auto; display: block; }
        .video-container { max-width: 800px; margin: 50px auto; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        /* 燈箱與箭頭 */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        #lightbox img { max-width: 85%; max-height: 80%; border-radius: 5px; }
        .nav-btn { position: absolute; top: 50%; color: white; font-size: 3rem; cursor: pointer; padding: 20px; user-select: none; }
        #prev { left: 20px; } #next { right: 20px; }
    </style>
</head>
<body>

    <button class="back-btn" onclick="window.location.href='index.html'">返回首頁</button>
    <h2 class="section-title">2025/10 客製架高床</h2>

    <div class="gallery">
        <div class="card" onclick="openLightbox(0)"><img src="1.jpg" alt="1"></div>
        <div class="card" onclick="openLightbox(1)"><img src="2.jpg" alt="2"></div>
        <div class="card" onclick="openLightbox(2)"><img src="3.jpg" alt="3"></div>
        <div class="card" onclick="openLightbox(3)"><img src="4.jpg" alt="4"></div>
        <div class="card" onclick="openLightbox(4)"><img src="5.jpg" alt="5"></div>
        <div class="card" onclick="openLightbox(5)"><img src="6.jpg" alt="6"></div>
    </div>

    <div class="video-container">
        <video width="100%" controls>
            <source src="上下舖L型雙層床（修改） (1).mov" type="video/mp4">
            您的瀏覽器不支援影片播放。
        </video>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="nav-btn" id="prev" onclick="changeImage(-1); event.stopPropagation();">&#10094;</span>
        <img id="lightbox-img" src="" alt="放大圖">
        <span class="nav-btn" id="next" onclick="changeImage(1); event.stopPropagation();">&#10095;</span>
    </div>

    <script>
        var images = ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg"];
        var currentIndex = 0;
        function openLightbox(index) {
            currentIndex = index;
            document.getElementById('lightbox-img').src = images[currentIndex];
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        function changeImage(step) {
            currentIndex = (currentIndex + step + images.length) % images.length;
            document.getElementById('lightbox-img').src = images[currentIndex];
        }
    </script>
</body>
</html>
